name: 每日统计用户数据

on:
  schedule:
    - cron: '23 1 * * *'  # UTC 01:23 = 北京时间 09:23
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: traffic-stats
  cancel-in-progress: false

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 拉取Traffic并合并统计
        env:
          # 未配置 TRAFFIC_TOKEN 时回退到 GITHUB_TOKEN（可能无 Traffic 权限，脚本会给出提示）
          TRAFFIC_TOKEN: ${{ secrets.TRAFFIC_TOKEN != '' && secrets.TRAFFIC_TOKEN || secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: python .github/scripts/更新统计数据.py

      - name: 提交统计数据
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add 统计数据.json
          if git diff --cached --quiet; then
            echo "统计数据无变化，跳过提交"
          else
            git commit -m "统计: 更新每日用户数据 [skip ci]"
            git pull --rebase origin main
            git push
          fi
